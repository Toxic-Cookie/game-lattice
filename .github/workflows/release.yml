name: Release

# Cuts a release on every push to main (i.e. every merged PR). Versioning:
#   - no v* tag yet        -> use <Version> from Directory.Build.props as-is
#   - default              -> patch bump of the latest v* tag
#   - PR label release:minor / release:major -> bump that part instead
#   - PR label release:skip, or "[skip release]" in the head commit message
#     (for direct pushes, which can't carry labels) -> no release
# Publishing steps degrade gracefully: nuget.org is gated on its secret, and the
# GitHub Release (nupkgs, UPM tarball, Godot zip) always ships. One-time registry
# setup lives in docs/releasing.md.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Compute version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git log -1 --format=%B "$GITHUB_SHA" | grep -qiF '[skip release]'; then
            echo "[skip release] in commit message; not releasing."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          labels=$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/pulls" \
            --jq '[.[0].labels[]?.name] | join(",")' 2>/dev/null || echo "")
          echo "PR labels: ${labels:-none}"
          if [[ ",$labels," == *",release:skip,"* ]]; then
            echo "release:skip label present; not releasing."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          last_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$last_tag" ]; then
            version=$(sed -n 's@.*<Version>\(.*\)</Version>.*@\1@p' Directory.Build.props)
            echo "No release tag yet; using Directory.Build.props version $version"
          else
            base="${last_tag#v}"
            IFS=. read -r major minor patch <<< "$base"
            if [[ ",$labels," == *",release:major,"* ]]; then
              version="$((major + 1)).0.0"
            elif [[ ",$labels," == *",release:minor,"* ]]; then
              version="$major.$((minor + 1)).0"
            else
              version="$major.$minor.$((patch + 1))"
            fi
          fi
          if git rev-parse -q --verify "refs/tags/v$version" > /dev/null; then
            echo "Tag v$version already exists; skipping (re-run of an already-released commit)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Releasing v$version"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build
        if: steps.version.outputs.skip != 'true'
        run: dotnet build game-lattice.slnx -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        if: steps.version.outputs.skip != 'true'
        run: dotnet test game-lattice.slnx -c Release --no-build -p:Version=${{ steps.version.outputs.version }} --verbosity normal

      - name: Pack NuGet packages
        if: steps.version.outputs.skip != 'true'
        run: dotnet pack game-lattice.slnx -c Release -p:Version=${{ steps.version.outputs.version }} -o artifacts/nuget

      - name: Build Unity UPM package
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: ./scripts/Build-UnityPackage.ps1 -Version ${{ steps.version.outputs.version }}

      - name: Build Godot addon
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: ./scripts/Build-GodotAddon.ps1 -Version ${{ steps.version.outputs.version }}

      - name: Create GitHub release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "v$VERSION" \
            artifacts/nuget/*.nupkg \
            artifacts/nuget/*.snupkg \
            "artifacts/com.gamelattice.lattice-$VERSION.tgz" \
            "artifacts/game-lattice-addon-$VERSION.zip" \
            --title "v$VERSION" \
            --target "$GITHUB_SHA" \
            --generate-notes

      - name: Publish to nuget.org
        if: steps.version.outputs.skip != 'true'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::notice::NUGET_API_KEY secret not set; skipping nuget.org publish (see docs/releasing.md)."
            exit 0
          fi
          dotnet nuget push "artifacts/nuget/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Publish upm branch + tag (git-URL installs and OpenUPM)
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          cd artifacts/upm-staging/package
          git init -q -b upm
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "com.gamelattice.lattice $VERSION"
          git tag "upm/$VERSION"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" upm "upm/$VERSION"

      # Godot Asset Store (store.godotengine.org): no upload API yet — versions are
      # uploaded manually from the release zip until the planned store CLI ships
      # (https://github.com/godotengine/godot-asset-store-tracker/issues/15).
      - name: Godot Asset Store reminder
        if: steps.version.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "::notice::Godot Asset Store has no upload API yet: upload game-lattice-addon-$VERSION.zip from the GitHub release manually (see docs/releasing.md)."
