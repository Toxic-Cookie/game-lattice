name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build game-lattice.slnx -c Release

      - name: Test
        run: dotnet test game-lattice.slnx -c Release --no-build --verbosity normal

      - name: Validate content
        run: dotnet run --project src/Lattice.Tooling -c Release --no-build -- validate content

      - name: Schema drift check
        run: |
          dotnet run --project src/Lattice.Tooling -c Release --no-build -- schemas -o /tmp/schemas
          diff -r /tmp/schemas schemas

      - name: Generate manifest
        run: dotnet run --project src/Lattice.Tooling -c Release --no-build -- manifest content -o /tmp/manifest.md

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: content-manifest
          path: /tmp/manifest.md
